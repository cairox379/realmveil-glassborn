<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realmveil: Glassborn</title>

<style>
html,body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial,sans-serif;
}

canvas{
display:block;
width:100vw;
height:100vh;
}

#hud{
position:fixed;
top:20px;
left:20px;
z-index:10;
color:white;
background:rgba(0,0,0,.45);
border:2px solid #7df7ff;
border-radius:18px;
padding:14px;
width:280px;
backdrop-filter:blur(6px);
}

.bar{
width:100%;
height:18px;
background:#111;
border-radius:20px;
overflow:hidden;
margin-bottom:10px;
}

.hp{
width:100%;
height:100%;
background:#00ff99;
}

.mana{
width:70%;
height:100%;
background:#008cff;
}

#controls{
position:fixed;
bottom:20px;
left:20px;
display:flex;
gap:12px;
z-index:10;
}

button{
padding:12px 18px;
background:rgba(0,0,0,.45);
border:2px solid #7df7ff;
border-radius:14px;
color:white;
font-size:18px;
}
</style>
</head>

<body>

<div id="hud">
<b>Shadowborn Knight</b><br><br>

HP
<div class="bar">
<div class="hp"></div>
</div>

Mana
<div class="bar">
<div class="mana"></div>
</div>

<div id="status">Loading Realm...</div>
</div>

<div id="controls">
<button onclick="attack()">⚔ Attack</button>
<button onclick="dash()">💨 Dash</button>
<button onclick="spell()">✦ Spell</button>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resizeCanvas(){

const scale=window.devicePixelRatio||1;

canvas.width=window.innerWidth*scale;
canvas.height=window.innerHeight*scale;

canvas.style.width=window.innerWidth+"px";
canvas.style.height=window.innerHeight+"px";

ctx.setTransform(scale,0,0,scale,0,0);

ctx.imageSmoothingEnabled=true;
ctx.imageSmoothingQuality="high";

}

resizeCanvas();

window.addEventListener("resize",resizeCanvas);

/* =========================
IMAGES
========================= */

const bg=new Image();
bg.src="./background.png.PNG";

const hero=new Image();
hero.src="./Noir%20.PNG";

/* =========================
PLAYER
========================= */

const player={

x:200,
y:window.innerHeight-360,

w:220,
h:300,

speed:5,

facing:1,

attack:false,
spell:false

};

const keys={};

/* =========================
KEYBOARD
========================= */

window.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;
});

window.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false;
});

/* =========================
ACTIONS
========================= */

function attack(){

player.attack=true;

setTimeout(()=>{
player.attack=false;
},250);

}

function dash(){

player.x+=100*player.facing;

}

function spell(){

player.spell=true;

setTimeout(()=>{
player.spell=false;
},350);

}

/* =========================
MOVEMENT
========================= */

function update(){

if(keys["a"]||keys["arrowleft"]){

player.x-=player.speed;
player.facing=-1;

}

if(keys["d"]||keys["arrowright"]){

player.x+=player.speed;
player.facing=1;

}

if(keys["w"]||keys["arrowup"]){
player.y-=player.speed;
}

if(keys["s"]||keys["arrowdown"]){
player.y+=player.speed;
}

player.x=Math.max(
0,
Math.min(window.innerWidth-player.w,player.x)
);

player.y=Math.max(
0,
Math.min(window.innerHeight-player.h,player.y)
);

}

/* =========================
BACKGROUND
========================= */

function drawBackground(){

ctx.drawImage(
bg,
0,
0,
window.innerWidth,
window.innerHeight
);

}

/* =========================
MAGIC PARTICLES
========================= */

function drawParticles(){

for(let i=0;i<30;i++){

ctx.fillStyle="rgba(180,255,220,.2)";

ctx.beginPath();

ctx.arc(
(i*70+Date.now()*0.02)%window.innerWidth,
120+(i*55)%window.innerHeight,
2,
0,
Math.PI*2
);

ctx.fill();

}

}

/* =========================
DRAW HERO
========================= */

function drawHero(){

const moving=
keys["a"]||
keys["d"]||
keys["arrowleft"]||
keys["arrowright"];

/* GROUNDED WALK */

const bounce=moving
?Math.abs(Math.sin(Date.now()*0.018))*5
:0;

/* SLIGHT ARMOR SWAY */

const sway=moving
?Math.sin(Date.now()*0.01)*0.015
:0;

/* CAPE DRAG */

const cape=moving
?Math.sin(Date.now()*0.012)*4
:0;

/* SHADOW */

ctx.save();

ctx.fillStyle="rgba(0,0,0,.28)";

ctx.beginPath();

ctx.ellipse(
player.x+player.w*.5,
player.y+player.h-6,
65,
14,
0,
0,
Math.PI*2
);

ctx.fill();

ctx.restore();

/* HERO */

ctx.save();

if(player.facing===-1){

ctx.translate(
player.x+player.w,
player.y+bounce
);

ctx.scale(-1,1);

ctx.rotate(-sway);

}else{

ctx.translate(
player.x,
player.y+bounce
);

ctx.rotate(sway);

}

ctx.translate(cape*.08,0);

ctx.drawImage(
hero,
0,
0,
player.w,
player.h
);

ctx.restore();

/* ATTACK EFFECT */

if(player.attack){

ctx.save();

ctx.strokeStyle="rgba(125,247,255,.95)";
ctx.lineWidth=7;

ctx.shadowBlur=25;
ctx.shadowColor="#7df7ff";

ctx.beginPath();

ctx.arc(
player.x+160,
player.y+160,
100,
-.8,
.8
);

ctx.stroke();

ctx.restore();

}

/* SPELL EFFECT */

if(player.spell){

ctx.save();

const pulse=
30+Math.sin(Date.now()*0.01)*6;

ctx.fillStyle="rgba(125,247,255,.55)";

ctx.shadowBlur=45;
ctx.shadowColor="#7df7ff";

ctx.beginPath();

ctx.arc(
player.x+170,
player.y+100,
pulse,
0,
Math.PI*2
);

ctx.fill();

ctx.restore();

}

}

/* =========================
GAME LOOP
========================= */

function gameLoop(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

drawBackground();

drawParticles();

update();

drawHero();

requestAnimationFrame(gameLoop);

}

/* =========================
START GAME
========================= */

bg.onload=()=>{

document.getElementById("status").innerText="Realm Loaded";

gameLoop();

};

</script>

</body>
</html>
