<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Realmveil: Glassborn</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #07131f;
  font-family: Arial, sans-serif;
}

canvas {
  width: 100vw;
  height: 100vh;
  display: block;
}

#hud {
  position: fixed;
  top: 12px;
  left: 12px;
  color: white;
  background: rgba(0,0,0,.48);
  border: 1px solid rgba(125,247,255,.75);
  border-radius: 14px;
  padding: 10px;
  font-size: 12px;
  z-index: 10;
  backdrop-filter: blur(8px);
}

#controls {
  position: fixed;
  bottom: 14px;
  left: 12px;
  display: flex;
  gap: 8px;
  z-index: 10;
}

button {
  background: rgba(0,0,0,.58);
  color: white;
  border: 1px solid rgba(125,247,255,.75);
  border-radius: 12px;
  padding: 9px 12px;
  font-size: 12px;
  backdrop-filter: blur(8px);
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="hud">
  <b>Realmveil: Glassborn</b><br>
  HP: <span id="hp">100</span> • XP: <span id="xp">0</span> • Level: <span id="level">1</span>
</div>

<div id="controls">
  <button onclick="attack()">⚔ Attack</button>
  <button onclick="spell()">✦ Spell</button>
  <button onclick="jump()">Jump</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W, H, scale;

function resize() {
  scale = window.devicePixelRatio || 1;
  W = canvas.width = innerWidth * scale;
  H = canvas.height = innerHeight * scale;
  canvas.style.width = innerWidth + "px";
  canvas.style.height = innerHeight + "px";
  ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
resize();
addEventListener("resize", resize);

let time = 0;

let hero = {
  x: 135,
  y: 0,
  groundY: 0,
  vy: 0,
  hp: 100,
  maxHp: 100,
  xp: 0,
  level: 1,
  attacking: false,
  casting: false,
  facing: 1
};

let monsters = [];
let particles = [];
let fireflies = [];

for (let i = 0; i < 80; i++) {
  fireflies.push({
    x: Math.random() * innerWidth,
    y: Math.random() * innerHeight * 0.75,
    r: Math.random() * 2 + 1,
    s: Math.random() * 0.5 + 0.2,
    o: Math.random()
  });
}

function spawnMonster() {
  monsters.push({
    x: innerWidth + 80,
    y: innerHeight - 118,
    w: 52,
    h: 62,
    hp: 55 + hero.level * 8,
    maxHp: 55 + hero.level * 8,
    speed: 0.8 + Math.random() * 0.8,
    type: Math.random() > 0.5 ? "wolf" : "goblin",
    hit: 0
  });
}

setInterval(spawnMonster, 2600);
spawnMonster();

function attack() {
  hero.attacking = true;
  setTimeout(() => hero.attacking = false, 260);

  monsters.forEach(m => {
    if (Math.abs(m.x - hero.x) < 110) {
      m.hp -= 28 + hero.level * 4;
      m.hit = 10;
      burst(m.x, m.y - 35, "#ffd36b");
    }
  });
}

function spell() {
  hero.casting = true;
  setTimeout(() => hero.casting = false, 400);

  monsters.forEach(m => {
    if (m.x < innerWidth + 50) {
      m.hp -= 16 + hero.level * 3;
      m.hit = 10;
      burst(m.x, m.y - 35, "#7df7ff");
    }
  });

  burst(hero.x + 50, hero.y - 70, "#7df7ff");
}

function jump() {
  if (Math.abs(hero.y - hero.groundY) < 1) {
    hero.vy = -13;
  }
}

function burst(x, y, color) {
  for (let i = 0; i < 20; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 5,
      vy: (Math.random() - 0.5) * 5,
      life: 32,
      color
    });
  }
}

function drawBackground() {
  const sky = ctx.createLinearGradient(0, 0, 0, innerHeight);
  sky.addColorStop(0, "#07142d");
  sky.addColorStop(0.35, "#123d46");
  sky.addColorStop(0.72, "#1f5d35");
  sky.addColorStop(1, "#2e7028");
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, innerWidth, innerHeight);

  ctx.fillStyle = "rgba(180,255,230,0.08)";
  ctx.beginPath();
  ctx.arc(innerWidth * 0.72, innerHeight * 0.14, 95, 0, Math.PI * 2);
  ctx.fill();

  drawParallaxTrees(0.25, "#0a1c25", 90, 0.35);
  drawParallaxTrees(0.45, "#123227", 120, 0.55);
  drawParallaxTrees(0.7, "#1e4e2d", 160, 0.8);

  drawGround();

  fireflies.forEach((f, i) => {
    f.x += f.s;
    f.y += Math.sin(time * 0.03 + i) * 0.15;
    if (f.x > innerWidth + 20) f.x = -20;

    ctx.globalAlpha = 0.35 + Math.sin(time * 0.05 + i) * 0.25;
    ctx.fillStyle = "#baffd9";
    ctx.shadowBlur = 12;
    ctx.shadowColor = "#7df7ff";
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  });
}

function drawParallaxTrees(speed, color, baseHeight, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;

  for (let i = 0; i < 9; i++) {
    const x = ((i * 190 - time * speed) % (innerWidth + 220)) - 120;
    const y = innerHeight - 86;

    ctx.fillStyle = color;
    ctx.fillRect(x + 42, y - baseHeight, 24, baseHeight);

    for (let j = 0; j < 6; j++) {
      ctx.beginPath();
      ctx.ellipse(
        x + 55 + (j - 3) * 18,
        y - baseHeight - 45 + Math.sin(j) * 18,
        58,
        42,
        0,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }
  }

  ctx.restore();
}

function drawGround() {
  ctx.fillStyle = "#2f7d35";
  ctx.fillRect(0, innerHeight - 82, innerWidth, 100);

  const glow = ctx.createLinearGradient(0, innerHeight - 118, 0, innerHeight);
  glow.addColorStop(0, "rgba(200,255,130,0.22)");
  glow.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = glow;
  ctx.fillRect(0, innerHeight - 120, innerWidth, 120);

  for (let i = 0; i < 160; i++) {
    const x = (i * 23 - time * 0.8) % innerWidth;
    const y = innerHeight - 70 - Math.sin(i) * 12;

    ctx.fillStyle = i % 3 === 0 ? "#d6ff9a" : "#8cff87";
    ctx.beginPath();
    ctx.ellipse(x, y, 3, 6, Math.sin(i), 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHero() {
  ctx.save();
  ctx.translate(hero.x, hero.y);

  if (hero.attacking) ctx.translate(12, 0);

  ctx.shadowBlur = 18;
  ctx.shadowColor = "#7df7ff";

  ctx.fillStyle = "#232a45";
  ctx.beginPath();
  ctx.roundRect(-15, -62, 30, 48, 10);
  ctx.fill();

  ctx.fillStyle = "#ffd6a5";
  ctx.beginPath();
  ctx.arc(0, -78, 14, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#5b2a1d";
  ctx.beginPath();
  ctx.arc(0, -86, 15, Math.PI, 0);
  ctx.fill();

  ctx.fillStyle = "#f2f6ff";
  ctx.fillRect(-6, -38, 12, 24);

  ctx.strokeStyle = "#e8f7ff";
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(14, -48);
  ctx.lineTo(hero.attacking ? 75 : 34, hero.attacking ? -62 : -78);
  ctx.stroke();

  ctx.strokeStyle = "#ffd36b";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-10, -16);
  ctx.lineTo(-18, 0);
  ctx.moveTo(10, -16);
  ctx.lineTo(18, 0);
  ctx.stroke();

  if (hero.casting) {
    ctx.shadowColor = "#7df7ff";
    ctx.shadowBlur = 30;
    ctx.fillStyle = "rgba(125,247,255,0.75)";
    ctx.beginPath();
    ctx.arc(52, -72, 24, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawMonster(m) {
  ctx.save();
  ctx.translate(m.x, m.y);

  if (m.hit > 0) ctx.translate(-8, 0);

  ctx.shadowBlur = 18;
  ctx.shadowColor = "#ff5c7a";

  ctx.fillStyle = m.type === "wolf" ? "#2b2346" : "#3d6b38";
  ctx.beginPath();
  ctx.ellipse(0, -34, 30, 34, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#ffdd66";
  ctx.beginPath();
  ctx.arc(-9, -42, 4, 0, Math.PI * 2);
  ctx.arc(9, -42, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#141414";
  ctx.fillRect(-20, -6, 8, 22);
  ctx.fillRect(12, -6, 8, 22);

  ctx.fillStyle = "rgba(255,255,255,0.25)";
  ctx.fillRect(-26, -82, 52, 6);

  ctx.fillStyle = "#ff5555";
  ctx.fillRect(-26, -82, 52 * Math.max(0, m.hp / m.maxHp), 6);

  ctx.restore();
}

function update() {
  time++;

  hero.groundY = innerHeight - 90;
  hero.vy += 0.7;
  hero.y += hero.vy;

  if (hero.y > hero.groundY) {
    hero.y = hero.groundY;
    hero.vy = 0;
  }

  monsters.forEach(m => {
    m.x -= m.speed;
    if (m.hit > 0) m.hit--;

    if (Math.abs(m.x - hero.x) < 35) {
      hero.hp = Math.max(0, hero.hp - 0.08);
    }
  });

  monsters = monsters.filter(m => {
    if (m.hp <= 0) {
      hero.xp += 10;
      if (hero.xp >= hero.level * 50) {
        hero.xp = 0;
        hero.level++;
        hero.maxHp += 10;
        hero.hp = hero.maxHp;
      }
      return false;
    }
    return m.x > -100;
  });

  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life--;
  });

  particles = particles.filter(p => p.life > 0);

  document.getElementById("hp").innerText = Math.floor(hero.hp);
  document.getElementById("xp").innerText = hero.xp;
  document.getElementById("level").innerText = hero.level;
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 32;
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 16;
    ctx.shadowColor = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  });
}

function loop() {
  update();
  drawBackground();
  drawHero();
  monsters.forEach(drawMonster);
  drawParticles();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
