<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Realmveil: Glassborn</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  width: 100%;
  height: 100%;
  background: #07131f;
  font-family: Arial, sans-serif;
}

canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}

#hud {
  position: fixed;
  top: 14px;
  left: 14px;
  color: white;
  z-index: 10;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(125,247,255,0.7);
  border-radius: 12px;
  padding: 10px;
  font-size: 12px;
  backdrop-filter: blur(8px);
}

.bar {
  width: 190px;
  height: 13px;
  background: rgba(0,0,0,0.7);
  border-radius: 20px;
  overflow: hidden;
  margin-top: 5px;
}

.health {
  height: 100%;
  width: 100%;
  background: linear-gradient(to right, #00ff99, #00cc66);
}

.mana {
  height: 100%;
  width: 70%;
  background: linear-gradient(to right, #00ccff, #004cff);
}

#controls {
  position: fixed;
  bottom: 14px;
  left: 14px;
  z-index: 10;
  display: flex;
  gap: 8px;
}

button {
  background: rgba(0,0,0,0.55);
  color: white;
  border: 1px solid rgba(125,247,255,0.75);
  border-radius: 12px;
  padding: 10px 13px;
}
</style>
</head>

<body>

<div id="hud">
  <b>Shadowborn Knight</b><br>
  HP
  <div class="bar"><div class="health" id="healthBar"></div></div>
  Mana
  <div class="bar"><div class="mana" id="manaBar"></div></div>
</div>

<div id="controls">
  <button onclick="attack()">⚔ Attack</button>
  <button onclick="dash()">💨 Dash</button>
  <button onclick="spell()">✦ Spell</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize", resize);

const hero = new Image();

/*
Your uploaded file is named:
Noir .PNG

Because there is a space before .PNG, we must write it like this:
*/
hero.src = "Noir%20.PNG";

let heroReady = false;

hero.onload = () => {
  heroReady = true;
};

let player = {
  x: 160,
  y: canvas.height - 360,
  width: 260,
  height: 320,
  speed: 5,
  vx: 0,
  hp: 100,
  mana: 70,
  attacking: false,
  dashing: false,
  casting: false,
  facing: 1
};

let cameraX = 0;
let time = 0;
let particles = [];
let enemies = [];

const keys = {};

window.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});

function spawnEnemy() {
  enemies.push({
    x: canvas.width + 100 + Math.random() * 400,
    y: canvas.height - 190,
    width: 70,
    height: 90,
    hp: 60,
    speed: 1 + Math.random() * 0.7,
    type: Math.random() > 0.5 ? "wraith" : "goblin"
  });
}

setInterval(spawnEnemy, 3000);
spawnEnemy();

function attack() {
  player.attacking = true;

  enemies.forEach(enemy => {
    const dx = Math.abs((enemy.x - cameraX) - player.x);
    if (dx < 160) {
      enemy.hp -= 30;
      burst(enemy.x - cameraX, enemy.y, "#ffd36b");
    }
  });

  setTimeout(() => {
    player.attacking = false;
  }, 250);
}

function dash() {
  player.dashing = true;
  player.x += 80 * player.facing;

  burst(player.x, player.y + 120, "#7df7ff");

  setTimeout(() => {
    player.dashing = false;
  }, 220);
}

function spell() {
  if (player.mana < 15) return;

  player.casting = true;
  player.mana -= 15;

  enemies.forEach(enemy => {
    enemy.hp -= 18;
    burst(enemy.x - cameraX, enemy.y, "#7df7ff");
  });

  setTimeout(() => {
    player.casting = false;
  }, 350);
}

function burst(x, y, color) {
  for (let i = 0; i < 24; i++) {
    particles.push({
      x,
      y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 35,
      color
    });
  }
}

function drawBackground() {
  const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
  sky.addColorStop(0, "#071936");
  sky.addColorStop(0.45, "#143f4a");
  sky.addColorStop(0.8, "#2c6736");
  sky.addColorStop(1, "#4dbb65");

  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const glow = ctx.createRadialGradient(
    canvas.width * 0.72,
    110,
    10,
    canvas.width * 0.72,
    110,
    240
  );

  glow.addColorStop(0, "rgba(140,230,255,0.28)");
  glow.addColorStop(1, "rgba(0,0,0,0)");

  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawTreeLayer(0.15, "#071522", 220, 0.45);
  drawTreeLayer(0.35, "#14342b", 190, 0.7);
  drawTreeLayer(0.7, "#245b35", 150, 1);

  drawGround();
  drawFireflies();
}

function drawTreeLayer(speed, color, height, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;

  for (let i = 0; i < 10; i++) {
    const x = ((i * 180 - cameraX * speed) % (canvas.width + 260)) - 140;
    const base = canvas.height - 110;

    drawTree(x, base, height, color);
  }

  ctx.restore();
}

  ctx.fillStyle = "#3a2414";

  ctx.beginPath();
  ctx.moveTo(x + 40, y);
  ctx.bezierCurveTo(x + 52, y - h * 0.35, x + 25, y - h * 0.7, x + 60, y - h);
  ctx.bezierCurveTo(x + 95, y - h * 0.65, x + 78, y - h * 0.25, x + 85, y);
  ctx.closePath();
  ctx.fill();
