<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realmveil: Glassborn</title>
<style>
html,body{margin:0;overflow:hidden;background:#07131f;font-family:Arial}
canvas{display:block;width:100vw;height:100vh}
#hud{position:fixed;top:14px;left:14px;color:white;background:rgba(0,0,0,.5);border:1px solid #7df7ff;border-radius:14px;padding:10px;z-index:10}
#controls{position:fixed;bottom:80px;left:14px;display:flex;gap:10px;z-index:10}
button{background:rgba(0,0,0,.55);color:white;border:1px solid #7df7ff;border-radius:14px;padding:12px}
</style>
</head>
<body>

<div id="hud">
<b>Shadowborn Knight</b><br>
HP <div style="width:220px;height:14px;background:#111;border-radius:20px"><div style="width:100%;height:100%;background:#00ff99;border-radius:20px"></div></div>
Mana <div style="width:220px;height:14px;background:#111;border-radius:20px"><div style="width:70%;height:100%;background:#009dff;border-radius:20px"></div></div>
<div id="status">Loading assets...</div>
</div>

<div id="controls">
<button onclick="attack()">⚔ Attack</button>
<button onclick="dash()">💨 Dash</button>
<button onclick="spell()">✦ Spell</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const statusBox=document.getElementById("status");

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

const hero=new Image();
hero.src="./Noir%20.PNG";

const bg=new Image();
bg.src="./background.png";

let heroLoaded=false;
let bgLoaded=false;

hero.onload=()=>{heroLoaded=true;updateStatus();}
bg.onload=()=>{bgLoaded=true;updateStatus();}

hero.onerror=()=>{statusBox.innerText="Hero not found";}
bg.onerror=()=>{statusBox.innerText="Background not found. Upload background.png";}

function updateStatus(){
  if(heroLoaded && bgLoaded) statusBox.innerText="Assets loaded";
  else if(heroLoaded) statusBox.innerText="Hero loaded, waiting for background";
  else if(bgLoaded) statusBox.innerText="Background loaded, waiting for hero";
}

let player={
  x:140,
  y:innerHeight-370,
  w:250,
  h:320,
  speed:5,
  facing:1,
  attack:false,
  dash:false,
  spell:false
};

const keys={};

addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function attack(){player.attack=true;setTimeout(()=>player.attack=false,250)}
function dash(){player.x+=90*player.facing;player.dash=true;setTimeout(()=>player.dash=false,250)}
function spell(){player.spell=true;setTimeout(()=>player.spell=false,350)}

function drawBackground(){
  if(!bgLoaded){
    ctx.fillStyle="#07131f";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    return;
  }

  const imgRatio=bg.width/bg.height;
  const canvasRatio=canvas.width/canvas.height;

  let drawW,drawH,drawX,drawY;

  if(canvasRatio>imgRatio){
    drawW=canvas.width;
    drawH=canvas.width/imgRatio;
    drawX=0;
    drawY=(canvas.height-drawH)/2;
  }else{
    drawH=canvas.height;
    drawW=canvas.height*imgRatio;
    drawX=(canvas.width-drawW)/2;
    drawY=0;
  }

  ctx.drawImage(bg,drawX,drawY,drawW,drawH);
}

function update(){
  if(keys["a"]||keys["arrowleft"]){player.x-=player.speed;player.facing=-1}
  if(keys["d"]||keys["arrowright"]){player.x+=player.speed;player.facing=1}
  if(keys["w"]||keys["arrowup"])player.y-=player.speed;
  if(keys["s"]||keys["arrowdown"])player.y+=player.speed;

  player.x=Math.max(0,Math.min(canvas.width-player.w,player.x));
  player.y=Math.max(100,Math.min(canvas.height-player.h-70,player.y));
}

function drawHero(){
  if(!heroLoaded)return;

  const moving=keys["a"]||keys["d"]||keys["arrowleft"]||keys["arrowright"];
  let walkBounce=moving?Math.sin(Date.now()*0.018)*12:Math.sin(Date.now()*0.004)*4;

  ctx.save();

  if(player.facing===-1){
    ctx.translate(player.x+player.w,player.y+walkBounce);
    ctx.scale(-1,1);
    ctx.drawImage(hero,0,0,player.w,player.h);
  }else{
    ctx.drawImage(hero,player.x,player.y+walkBounce,player.w,player.h);
  }

  ctx.restore();

  if(player.attack){
    ctx.strokeStyle="rgba(125,247,255,.9)";
    ctx.lineWidth=6;
    ctx.beginPath();
    ctx.arc(player.x+170,player.y+170,90,-.7,.7);
    ctx.stroke();
  }

  if(player.spell){
    ctx.fillStyle="rgba(125,247,255,.6)";
    ctx.beginPath();
    ctx.arc(player.x+190,player.y+100,30,0,Math.PI*2);
    ctx.fill();
  }
}

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBackground();
  update();
  drawHero();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
