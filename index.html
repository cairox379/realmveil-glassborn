<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Realmveil: Glassborn</title>

<style>
html, body {
  margin:0;
  overflow:hidden;
  background:#07131f;
}

canvas {
  display:block;
}

#hud {
  position:fixed;
  top:20px;
  left:20px;
  color:white;
  font-family:Arial;
  z-index:10;
}

.bar {
  width:220px;
  height:18px;
  background:#222;
  border-radius:20px;
  overflow:hidden;
  margin-bottom:10px;
}

.fill-health {
  height:100%;
  width:85%;
  background:linear-gradient(to right,#00ff99,#00cc66);
}

.fill-mana {
  height:100%;
  width:60%;
  background:linear-gradient(to right,#00aaff,#0044ff);
}
</style>
</head>

<body>

<div id="hud">
  <div>LEVEL 1 SHADOW KNIGHT</div>

  <div class="bar">
    <div class="fill-health"></div>
  </div>

  <div class="bar">
    <div class="fill-mana"></div>
  </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const hero = new Image();

/*
REPLACE THIS WITH YOUR PNG URL LATER
*/
hero.src = "https://i.imgur.com/8RKXAIV.png";

let player = {
  x: 300,
  y: 420,
  width: 240,
  height: 240,
  speed: 6
};

const keys = {};

window.addEventListener("keydown", e => {
  keys[e.key] = true;
});

window.addEventListener("keyup", e => {
  keys[e.key] = false;
});

function drawBackground() {

  // SKY
  const sky = ctx.createLinearGradient(
    0,
    0,
    0,
    canvas.height
  );

  sky.addColorStop(0, "#10263f");
  sky.addColorStop(1, "#07131f");

  ctx.fillStyle = sky;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // GLOW
  const moonGlow = ctx.createRadialGradient(
    canvas.width * 0.7,
    120,
    10,
    canvas.width * 0.7,
    120,
    220
  );

  moonGlow.addColorStop(0,"rgba(120,220,255,0.25)");
  moonGlow.addColorStop(1,"rgba(0,0,0,0)");

  ctx.fillStyle = moonGlow;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // TREES
  for(let i=0;i<18;i++){

    let x = i * 180;

    ctx.fillStyle = "#13291d";

    ctx.fillRect(
      x + 40,
      180,
      45,
      420
    );

    ctx.beginPath();

    ctx.arc(
      x + 60,
      180,
      90,
      0,
      Math.PI * 2
    );

    ctx.fillStyle = "#29593f";
    ctx.fill();

    ctx.beginPath();

    ctx.arc(
      x + 95,
      200,
      70,
      0,
      Math.PI * 2
    );

    ctx.fillStyle = "#3d7a58";
    ctx.fill();
  }

  // GROUND
  const ground = ctx.createLinearGradient(
    0,
    canvas.height - 220,
    0,
    canvas.height
  );

  ground.addColorStop(0,"#5ccf88");
  ground.addColorStop(1,"#1e5934");

  ctx.fillStyle = ground;

  ctx.fillRect(
    0,
    canvas.height - 220,
    canvas.width,
    220
  );

  // LIGHT PARTICLES
  for(let i=0;i<80;i++){

    ctx.fillStyle =
      "rgba(255,255,255,0.18)";

    ctx.beginPath();

    ctx.arc(
      Math.random() * canvas.width,
      Math.random() * canvas.height,
      Math.random() * 2,
      0,
      Math.PI * 2
    );

    ctx.fill();
  }
}

function update() {

  if(keys["a"] || keys["ArrowLeft"]){
    player.x -= player.speed;
  }

  if(keys["d"] || keys["ArrowRight"]){
    player.x += player.speed;
  }

  if(keys["w"] || keys["ArrowUp"]){
    player.y -= player.speed;
  }

  if(keys["s"] || keys["ArrowDown"]){
    player.y += player.speed;
  }
}

function drawHero(){

  ctx.drawImage(
    hero,
    player.x,
    player.y,
    player.width,
    player.height
  );
}

function gameLoop(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  drawBackground();

  update();

  drawHero();

  requestAnimationFrame(gameLoop);
}

hero.onload = () => {
  gameLoop();
};
</script>

</body>
</html>
