<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realmveil: Glassborn</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07131f;font-family:Arial}
canvas{width:100vw;height:100vh;display:block}
#hud{position:fixed;top:12px;left:12px;color:white;background:rgba(0,0,0,.45);border:1px solid #7df7ff;border-radius:14px;padding:10px;font-size:12px}
#controls{position:fixed;bottom:14px;left:12px;display:flex;gap:8px}
button{background:rgba(0,0,0,.55);color:white;border:1px solid #7df7ff;border-radius:12px;padding:9px 12px}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
  <b>Realmveil: Glassborn</b><br>
  HP: <span id="hp">100</span> • XP: <span id="xp">0</span>
</div>

<div id="controls">
  <button onclick="attack()">⚔ Attack</button>
  <button onclick="spell()">✦ Spell</button>
  <button onclick="jump()">Jump</button>
</div>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");
let W,H;

function resize(){
  W=c.width=innerWidth*devicePixelRatio;
  H=c.height=innerHeight*devicePixelRatio;
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}
resize();
addEventListener("resize",resize);

let hero={x:120,y:0,w:34,h:70,hp:100,xp:0,vy:0,jump:false,attack:false,spell:false};
let monsters=[];
let particles=[];
let t=0;

function spawnMonster(){
  monsters.push({
    x:innerWidth+80,
    y:innerHeight-140,
    w:50,
    h:55,
    hp:50,
    speed:1.2+Math.random()*1.3,
    type:Math.random()>.5?"wolf":"goblin"
  });
}
setInterval(spawnMonster,2600);
spawnMonster();

function attack(){
  hero.attack=true;
  setTimeout(()=>hero.attack=false,250);
  monsters.forEach(m=>{
    if(Math.abs(m.x-hero.x)<95){
      m.hp-=30;
      hitParticles(m.x,m.y,"#ffd36b");
    }
  });
}

function spell(){
  hero.spell=true;
  setTimeout(()=>hero.spell=false,350);
  monsters.forEach(m=>{
    if(m.x<innerWidth){
      m.hp-=18;
      hitParticles(m.x,m.y,"#7df7ff");
    }
  });
}

function jump(){
  if(!hero.jump){
    hero.vy=-13;
    hero.jump=true;
  }
}

function hitParticles(x,y,color){
  for(let i=0;i<18;i++){
    particles.push({x,y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,life:30,color});
  }
}

function drawBackground(){
  let g=ctx.createLinearGradient(0,0,0,innerHeight);
  g.addColorStop(0,"#071936");
  g.addColorStop(.5,"#113b3d");
  g.addColorStop(1,"#11320f");
  ctx.fillStyle=g;
  ctx.fillRect(0,0,innerWidth,innerHeight);

  ctx.fillStyle="rgba(130,255,220,.12)";
  for(let i=0;i<45;i++){
    let x=(i*93+t*.15)%innerWidth;
    let y=40+(i*47)%innerHeight;
    ctx.beginPath();
    ctx.arc(x,y,2+Math.sin(t*.03+i)*1.5,0,Math.PI*2);
    ctx.fill();
  }

  drawTree(80,innerHeight-130,1.2);
  drawTree(310,innerHeight-145,1.7);
  drawTree(innerWidth-220,innerHeight-135,1.5);
  drawTree(innerWidth-50,innerHeight-125,1.2);

  ctx.fillStyle="#2f7d35";
  ctx.fillRect(0,innerHeight-80,innerWidth,90);

  for(let i=0;i<90;i++){
    ctx.fillStyle=i%2?"#8cff87":"#d6ff9a";
    ctx.beginPath();
    ctx.arc((i*31+t)%innerWidth,innerHeight-72-Math.random()*20,2,0,Math.PI*2);
    ctx.fill();
  }
}

function drawTree(x,y,s){
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(s,s);
  ctx.fillStyle="#4a2d13";
  ctx.beginPath();
  ctx.moveTo(-18,0);
  ctx.quadraticCurveTo(-8,-100,10,-170);
  ctx.quadraticCurveTo(35,-95,20,0);
  ctx.fill();

  for(let i=0;i<7;i++){
    ctx.fillStyle=`rgba(${30+i*8},${110+i*18},55,.9)`;
    ctx.beginPath();
    ctx.ellipse((i-3)*18,-150+Math.sin(i)*20,55,42,0,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawHero(){
  ctx.save();
  ctx.translate(hero.x,hero.y);

  ctx.fillStyle="#7fdcff";
  ctx.shadowBlur=18;
  ctx.shadowColor="#7df7ff";

  ctx.fillRect(-10,-55,20,45);
  ctx.beginPath();
  ctx.arc(0,-70,14,0,Math.PI*2);
  ctx.fill();

  ctx.shadowBlur=0;
  ctx.fillStyle="#262b46";
  ctx.fillRect(-13,-58,26,38);

  ctx.fillStyle="#ffd6a5";
  ctx.beginPath();
  ctx.arc(0,-72,12,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#5b2a1d";
  ctx.beginPath();
  ctx.arc(0,-82,13,Math.PI,0);
  ctx.fill();

  ctx.strokeStyle="#e8f7ff";
  ctx.lineWidth=4;
  ctx.beginPath();
  ctx.moveTo(12,-45);
  ctx.lineTo(hero.attack?70:-5,-65);
  ctx.stroke();

  if(hero.spell){
    ctx.fillStyle="rgba(125,247,255,.7)";
    ctx.beginPath();
    ctx.arc(45,-70,22,0,Math.PI*2);
    ctx.fill();
  }

  ctx.restore();
}

function drawMonster(m){
  ctx.save();
  ctx.translate(m.x,m.y);

  ctx.shadowBlur=18;
  ctx.shadowColor="#ff5c7a";

  ctx.fillStyle=m.type==="wolf"?"#2b2346":"#3d6b38";
  ctx.beginPath();
  ctx.ellipse(0,-30,28,32,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#ffdd66";
  ctx.beginPath();
  ctx.arc(-9,-38,4,0,Math.PI*2);
  ctx.arc(9,-38,4,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#151515";
  ctx.fillRect(-20,-5,8,20);
  ctx.fillRect(12,-5,8,20);

  ctx.restore();
}

function update(){
  t++;

  hero.y=innerHeight-90;
  hero.vy+=.7;
  hero.y+=hero.vy;
  if(hero.y>innerHeight-90){
    hero.y=innerHeight-90;
    hero.vy=0;
    hero.jump=false;
  }

  monsters.forEach(m=>m.x-=m.speed);
  monsters=monsters.filter(m=>{
    if(m.hp<=0){hero.xp+=10;return false}
    if(m.x<-80)return false;
    if(Math.abs(m.x-hero.x)<35){
      hero.hp=Math.max(0,hero.hp-.08);
    }
    return true;
  });

  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life--;
  });
  particles=particles.filter(p=>p.life>0);

  document.getElementById("hp").innerText=Math.floor(hero.hp);
  document.getElementById("xp").innerText=hero.xp;
}

function draw(){
  drawBackground();
  drawHero();
  monsters.forEach(drawMonster);

  particles.forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.globalAlpha=p.life/30;
    ctx.beginPath();
    ctx.arc(p.x,p.y,4,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  });
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
