<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Realmveil: Glassborn</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;
    background: black;
    font-family: Arial, sans-serif;
}

canvas {
    display: block;
    width: 100vw;
    height: 100vh;
}

/* UI */
#ui {
    position: fixed;
    top: 25px;
    left: 25px;
    z-index: 10;
    color: white;
    background: rgba(0,0,0,0.55);
    border: 2px solid #69e5ff;
    border-radius: 24px;
    padding: 18px;
    width: 360px;
    backdrop-filter: blur(6px);
}

.title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
}

.bar {
    width: 100%;
    height: 22px;
    background: #111;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 14px;
}

.hp-fill {
    width: 100%;
    height: 100%;
    background: linear-gradient(to right,#00ff99,#3dff7a);
}

.mana-fill {
    width: 70%;
    height: 100%;
    background: linear-gradient(to right,#00aaff,#295dff);
}

.controls {
    position: fixed;
    bottom: 25px;
    left: 25px;
    z-index: 10;
    display: flex;
    gap: 14px;
}

.btn {
    padding: 14px 24px;
    border-radius: 18px;
    border: 2px solid #69e5ff;
    background: rgba(0,0,0,0.45);
    color: white;
    font-size: 20px;
    backdrop-filter: blur(4px);
}
</style>
</head>

<body>

<div id="ui">
    <div class="title">Shadowborn Knight</div>

    HP
    <div class="bar">
        <div class="hp-fill"></div>
    </div>

    Mana
    <div class="bar">
        <div class="mana-fill"></div>
    </div>
</div>

<div class="controls">
    <div class="btn">⚔ Attack</div>
    <div class="btn">💨 Dash</div>
    <div class="btn">✦ Spell</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// HD QUALITY FIX
function resizeCanvas() {
    const scale = window.devicePixelRatio || 1;

    canvas.width = window.innerWidth * scale;
    canvas.height = window.innerHeight * scale;

    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";

    ctx.setTransform(scale, 0, 0, scale, 0, 0);

    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// ======================
// IMAGES
// ======================

// BACKGROUND
const bgImage = new Image();
bgImage.src = "background.png.PNG";

// HERO
const hero = new Image();
hero.src = "Noir .PNG";

// TREE
const tree = new Image();
tree.src = "Tree.png.PNG";

// ======================
// PLAYER
// ======================

const player = {
    x: 250,
    y: window.innerHeight - 360,
    width: 180,
    height: 180,
    speed: 6
};

// ======================
// MOVEMENT
// ======================

const keys = {};

window.addEventListener("keydown", (e) => {
    keys[e.key] = true;
});

window.addEventListener("keyup", (e) => {
    keys[e.key] = false;
});

function update() {

    if (keys["ArrowLeft"] || keys["a"]) {
        player.x -= player.speed;
    }

    if (keys["ArrowRight"] || keys["d"]) {
        player.x += player.speed;
    }

    if (keys["ArrowUp"] || keys["w"]) {
        player.y -= player.speed;
    }

    if (keys["ArrowDown"] || keys["s"]) {
        player.y += player.speed;
    }

    // SCREEN LIMITS
    if (player.x < 0) player.x = 0;
    if (player.y < 0) player.y = 0;

    if (player.x + player.width > window.innerWidth) {
        player.x = window.innerWidth - player.width;
    }

    if (player.y + player.height > window.innerHeight) {
        player.y = window.innerHeight - player.height;
    }
}

// ======================
// DRAW BACKGROUND
// ======================

function drawBackground() {

    ctx.drawImage(
        bgImage,
        0,
        0,
        window.innerWidth,
        window.innerHeight
    );
}

// ======================
// DRAW TREES
// ======================

function drawTrees() {

    const treeY = window.innerHeight - 470;

    for (let i = 0; i < 12; i++) {

        ctx.drawImage(
            tree,
            i * 170,
            treeY,
            200,
            300
        );
    }
}

// ======================
// DRAW HERO
// ======================

function drawHero() {

    ctx.drawImage(
        hero,
        player.x,
        player.y,
        player.width,
        player.height
    );
}

// ======================
// GAME LOOP
// ======================

function gameLoop() {

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    drawBackground();

    drawTrees();

    update();

    drawHero();

    requestAnimationFrame(gameLoop);
}

// START GAME
bgImage.onload = () => {
    gameLoop();
};
</script>

</body>
</html>
