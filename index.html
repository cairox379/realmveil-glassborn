<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realmveil: Glassborn</title>

<style>
html,body{
  margin:0;
  overflow:hidden;
  background:#07131f;
  font-family:Arial;
}

canvas{
  display:block;
  width:100vw;
  height:100vh;
}

#hud{
  position:fixed;
  top:14px;
  left:14px;
  color:white;
  background:rgba(0,0,0,.5);
  border:1px solid #7df7ff;
  border-radius:14px;
  padding:10px;
  z-index:10;
}

#controls{
  position:fixed;
  bottom:80px;
  left:14px;
  display:flex;
  gap:10px;
  z-index:10;
}

button{
  background:rgba(0,0,0,.55);
  color:white;
  border:1px solid #7df7ff;
  border-radius:14px;
  padding:12px;
}
</style>
</head>

<body>

<div id="hud">
<b>Shadowborn Knight</b><br>
HP
<div style="width:220px;height:14px;background:#111;border-radius:20px">
<div style="width:100%;height:100%;background:#00ff99;border-radius:20px"></div>
</div>

Mana
<div style="width:220px;height:14px;background:#111;border-radius:20px">
<div style="width:70%;height:100%;background:#009dff;border-radius:20px"></div>
</div>

<div id="status">Loading assets...</div>
</div>

<div id="controls">
<button onclick="attack()">⚔ Attack</button>
<button onclick="dash()">💨 Dash</button>
<button onclick="spell()">✦ Spell</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const statusBox=document.getElementById("status");

function resize(){
  const scale=window.devicePixelRatio||1;

  canvas.width=window.innerWidth*scale;
  canvas.height=window.innerHeight*scale;

  canvas.style.width=window.innerWidth+"px";
  canvas.style.height=window.innerHeight+"px";

  ctx.setTransform(scale,0,0,scale,0,0);
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality="high";
}

resize();
window.addEventListener("resize",resize);

const hero=new Image();
hero.src="./Noir%20.PNG";

const bg=new Image();
bg.src="./background.png.PNG";

let heroLoaded=false;
let bgLoaded=false;

hero.onload=()=>{
  heroLoaded=true;
  updateStatus();
};

bg.onload=()=>{
  bgLoaded=true;
  updateStatus();
};

hero.onerror=()=>{
  statusBox.innerText="Hero not found. Check Noir .PNG";
};

bg.onerror=()=>{
  statusBox.innerText="Background not found. Check background.png.PNG";
};

function updateStatus(){
  if(heroLoaded && bgLoaded){
    statusBox.innerText="Assets loaded";
  }else if(heroLoaded){
    statusBox.innerText="Hero loaded, waiting for background";
  }else if(bgLoaded){
    statusBox.innerText="Background loaded, waiting for hero";
  }
}

let player={
  x:160,
  y:window.innerHeight-390,
  w:240,
  h:320,
  speed:5,
  facing:1,
  attack:false,
  dash:false,
  spell:false
};

const keys={};

window.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()]=true;
});

window.addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()]=false;
});

function attack(){
  player.attack=true;
  setTimeout(()=>player.attack=false,250);
}

function dash(){
  player.x+=100*player.facing;
}

function spell(){
  player.spell=true;
  setTimeout(()=>player.spell=false,350);
}

function drawBackground(){
  if(!bgLoaded){
    ctx.fillStyle="#07131f";
    ctx.fillRect(0,0,window.innerWidth,window.innerHeight);
    return;
  }

  const imgRatio=bg.width/bg.height;
  const screenRatio=window.innerWidth/window.innerHeight;

  let drawW,drawH,drawX,drawY;

  if(screenRatio>imgRatio){
    drawW=window.innerWidth;
    drawH=window.innerWidth/imgRatio;
    drawX=0;
    drawY=(window.innerHeight-drawH)/2;
  }else{
    drawH=window.innerHeight;
    drawW=window.innerHeight*imgRatio;
    drawX=(window.innerWidth-drawW)/2;
    drawY=0;
  }

  ctx.drawImage(bg,drawX,drawY,drawW,drawH);
}

function update(){
  if(keys["a"]||keys["arrowleft"]){
    player.x-=player.speed;
    player.facing=-1;
  }

  if(keys["d"]||keys["arrowright"]){
    player.x+=player.speed;
    player.facing=1;
  }

  if(keys["w"]||keys["arrowup"]){
    player.y-=player.speed;
  }

  if(keys["s"]||keys["arrowdown"]){
    player.y+=player.speed;
  }

  player.x=Math.max(0,Math.min(window.innerWidth-player.w,player.x));
  player.y=Math.max(80,Math.min(window.innerHeight-player.h-40,player.y));
}

function drawHero(){
  if(!heroLoaded)return;

  const moving=
    keys["a"]||
    keys["d"]||
    keys["arrowleft"]||
    keys["arrowright"];

  const bounce=moving
    ? Math.sin(Date.now()*0.018)*10
    : Math.sin(Date.now()*0.004)*4;

  ctx.save();

  if(player.facing===-1){
    ctx.translate(player.x+player.w,player.y+bounce);
    ctx.scale(-1,1);
    ctx.drawImage(hero,0,0,player.w,player.h);
  }else{
    ctx.drawImage(hero,player.x,player.y+bounce,player.w,player.h);
  }

  ctx.restore();

  if(player.attack){
    ctx.save();
    ctx.strokeStyle="rgba(125,247,255,.9)";
    ctx.lineWidth=6;
    ctx.shadowBlur=20;
    ctx.shadowColor="#7df7ff";
    ctx.beginPath();
    ctx.arc(player.x+160,player.y+165,90,-.7,.7);
    ctx.stroke();
    ctx.restore();
  }

  if(player.spell){
    ctx.save();
    ctx.fillStyle="rgba(125,247,255,.6)";
    ctx.shadowBlur=30;
    ctx.shadowColor="#7df7ff";
    ctx.beginPath();
    ctx.arc(player.x+170,player.y+100,34,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function loop(){
  ctx.clearRect(0,0,window.innerWidth,window.innerHeight);

  drawBackground();
  update();
  drawHero();

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
