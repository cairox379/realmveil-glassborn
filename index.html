<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realmveil: Glassborn</title>

<style>
html,body{
margin:0;
overflow:hidden;
background:#07131f;
font-family:Arial;
}

canvas{
display:block;
width:100vw;
height:100vh;
}

#hud{
position:fixed;
top:14px;
left:14px;
color:white;
background:rgba(0,0,0,.5);
border:1px solid #7df7ff;
border-radius:14px;
padding:10px;
z-index:10;
backdrop-filter:blur(6px);
}

#controls{
position:fixed;
bottom:80px;
left:14px;
display:flex;
gap:10px;
z-index:10;
}

button{
background:rgba(0,0,0,.55);
color:white;
border:1px solid #7df7ff;
border-radius:14px;
padding:12px;
font-size:18px;
}
</style>
</head>

<body>

<div id="hud">
<b>Shadowborn Knight</b><br>

HP
<div style="width:220px;height:14px;background:#111;border-radius:20px">
<div style="width:100%;height:100%;background:#00ff99;border-radius:20px"></div>
</div>

Mana
<div style="width:220px;height:14px;background:#111;border-radius:20px">
<div style="width:70%;height:100%;background:#009dff;border-radius:20px"></div>
</div>

<div id="status">Loading assets...</div>
</div>

<div id="controls">
<button onclick="attack()">⚔ Attack</button>
<button onclick="dash()">💨 Dash</button>
<button onclick="spell()">✦ Spell</button>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const statusBox = document.getElementById("status");

function resize(){

const scale = window.devicePixelRatio || 1;

canvas.width = window.innerWidth * scale;
canvas.height = window.innerHeight * scale;

canvas.style.width = window.innerWidth + "px";
canvas.style.height = window.innerHeight + "px";

ctx.setTransform(scale,0,0,scale,0,0);

ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = "high";
}

resize();

window.addEventListener("resize",resize);

/* =========================
IMAGES
========================= */

const hero = new Image();
hero.src = "./Noir%20.PNG";

const bg = new Image();
bg.src = "./background.png.PNG";

let heroLoaded = false;
let bgLoaded = false;

hero.onload = () => {
heroLoaded = true;
updateStatus();
};

bg.onload = () => {
bgLoaded = true;
updateStatus();
};

function updateStatus(){

if(heroLoaded && bgLoaded){
statusBox.innerText = "Realm Loaded";
}

}

/* =========================
PLAYER
========================= */

let player = {

x:160,
y:window.innerHeight - 390,

w:240,
h:320,

speed:5,

facing:1,

attack:false,
spell:false,

velocityX:0

};

const keys = {};

/* =========================
INPUT
========================= */

window.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()] = false;
});

/* =========================
ACTIONS
========================= */

function attack(){

player.attack = true;

setTimeout(()=>{
player.attack = false;
},250);

}

function dash(){

player.x += 100 * player.facing;

}

function spell(){

player.spell = true;

setTimeout(()=>{
player.spell = false;
},350);

}

/* =========================
BACKGROUND
========================= */

function drawBackground(){

if(!bgLoaded){

ctx.fillStyle = "#07131f";
ctx.fillRect(
0,
0,
window.innerWidth,
window.innerHeight
);

return;
}

ctx.drawImage(
bg,
0,
0,
window.innerWidth,
window.innerHeight
);

}

/* =========================
MOVEMENT
========================= */

function update(){

player.velocityX = 0;

if(keys["a"] || keys["arrowleft"]){

player.x -= player.speed;
player.facing = -1;

player.velocityX = -1;

}

if(keys["d"] || keys["arrowright"]){

player.x += player.speed;
player.facing = 1;

player.velocityX = 1;

}

if(keys["w"] || keys["arrowup"]){

player.y -= player.speed;

}

if(keys["s"] || keys["arrowdown"]){

player.y += player.speed;

}

player.x = Math.max(
0,
Math.min(window.innerWidth - player.w,player.x)
);

player.y = Math.max(
80,
Math.min(window.innerHeight - player.h - 40,player.y)
);

}

/* =========================
DRAW HERO
========================= */

function drawHero(){

if(!heroLoaded) return;

const moving =
keys["a"] ||
keys["d"] ||
keys["arrowleft"] ||
keys["arrowright"];

/* IDLE BREATHING */

const breathing =
Math.sin(Date.now() * 0.003) * 5;

/* BODY SWAY */

const sway =
Math.sin(Date.now() * 0.002) * 0.03;

/* WALK BOUNCE */

const bounce = moving
? Math.sin(Date.now() * 0.018) * 12
: Math.sin(Date.now() * 0.004) * 4;

/* CAPE MOTION */

const cape =
moving
? Math.sin(Date.now() * 0.016) * 10
: Math.sin(Date.now() * 0.004) * 3;

/* SHADOW STRETCH */

const shadowStretch =
moving
? 70 + Math.abs(Math.sin(Date.now() * 0.018) * 18)
: 60;

ctx.save();

/* SHADOW */

ctx.fillStyle = "rgba(0,0,0,0.25)";

ctx.beginPath();

ctx.ellipse(
player.x + player.w * .5,
player.y + player.h - 8,
shadowStretch,
14,
0,
0,
Math.PI * 2
);

ctx.fill();

/* CHARACTER */

if(player.facing === -1){

ctx.translate(
player.x + player.w,
player.y + bounce
);

ctx.scale(-1,1);

ctx.rotate(-sway);

}else{

ctx.translate(
player.x,
player.y + bounce
);

ctx.rotate(sway);

}

/* CAPE SWAY OFFSET */

ctx.translate(cape * 0.2,breathing);

/* DRAW */

ctx.drawImage(
hero,
0,
0,
player.w,
player.h
);

ctx.restore();

/* SWORD TRAIL */

if(player.attack){

ctx.save();

ctx.strokeStyle = "rgba(125,247,255,.95)";
ctx.lineWidth = 7;

ctx.shadowBlur = 25;
ctx.shadowColor = "#7df7ff";

ctx.beginPath();

ctx.arc(
player.x + 160,
player.y + 160,
100,
-.8,
.8
);

ctx.stroke();

ctx.restore();

}

/* SPELL GLOW */

if(player.spell){

ctx.save();

const pulse =
30 + Math.sin(Date.now() * 0.01) * 8;

ctx.fillStyle = "rgba(125,247,255,.55)";

ctx.shadowBlur = 45;
ctx.shadowColor = "#7df7ff";

ctx.beginPath();

ctx.arc(
player.x + 170,
player.y + 100,
pulse,
0,
Math.PI * 2
);

ctx.fill();

ctx.restore();

}

}

/* =========================
PARTICLES
========================= */

function drawParticles(){

for(let i=0;i<35;i++){

ctx.fillStyle = "rgba(180,255,220,.22)";

ctx.beginPath();

ctx.arc(
(i * 70 + Date.now() * 0.02) % window.innerWidth,
120 + (i * 55) % window.innerHeight,
2,
0,
Math.PI * 2
);

ctx.fill();

}

}

/* =========================
GAME LOOP
========================= */

function loop(){

ctx.clearRect(
0,
0,
window.innerWidth,
window.innerHeight
);

drawBackground();

drawParticles();

update();

drawHero();

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
