<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Realmveil: Glassborn</title>

<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: #07131f;
    font-family: Arial, sans-serif;
}

canvas {
    display: block;
    width: 100vw;
    height: 100vh;
}

/* HUD */

#hud {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 10;

    background: rgba(0,0,0,0.55);
    border: 2px solid #7df7ff;
    border-radius: 18px;

    padding: 14px;
    color: white;

    width: 250px;

    backdrop-filter: blur(8px);
}

#hud h2 {
    margin: 0;
    font-size: 28px;
}

.label {
    margin-top: 10px;
    margin-bottom: 4px;
    font-size: 18px;
}

.bar {
    width: 100%;
    height: 18px;
    background: rgba(0,0,0,0.7);
    border-radius: 20px;
    overflow: hidden;
}

.fill-hp {
    width: 100%;
    height: 100%;
    background: linear-gradient(to right,#00ff99,#00ff66);
}

.fill-mana {
    width: 70%;
    height: 100%;
    background: linear-gradient(to right,#00bfff,#0044ff);
}

#status {
    margin-top: 10px;
    color: #d6ffff;
}

/* Controls */

#controls {
    position: fixed;
    bottom: 30px;
    left: 30px;
    z-index: 20;

    display: flex;
    gap: 14px;
}

button {
    background: rgba(0,0,0,0.55);
    color: white;

    border: 2px solid #7df7ff;
    border-radius: 16px;

    padding: 14px 24px;
    font-size: 20px;

    backdrop-filter: blur(6px);
}

button:active {
    transform: scale(0.95);
}
</style>
</head>

<body>

<div id="hud">
    <h2>Shadowborn Knight</h2>

    <div class="label">HP</div>
    <div class="bar">
        <div class="fill-hp"></div>
    </div>

    <div class="label">Mana</div>
    <div class="bar">
        <div class="fill-mana"></div>
    </div>

    <div id="status">Loading assets...</div>
</div>

<div id="controls">
    <button onclick="attack()">⚔ Attack</button>
    <button onclick="dash()">💨 Dash</button>
    <button onclick="spell()">✦ Spell</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const statusBox = document.getElementById("status");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();

window.addEventListener("resize", resizeCanvas);

/* =========================
   LOAD IMAGES
========================= */

const hero = new Image();
hero.src = "./Noir%20.PNG";

const background = new Image();
background.src = "./background.png.PNG";

const tree = new Image();
tree.src = "./Tree.png.PNG";

let heroLoaded = false;
let bgLoaded = false;
let treeLoaded = false;

hero.onload = () => {
    heroLoaded = true;
    updateStatus();
};

background.onload = () => {
    bgLoaded = true;
    updateStatus();
};

tree.onload = () => {
    treeLoaded = true;
    updateStatus();
};

function updateStatus() {
    if(heroLoaded && bgLoaded && treeLoaded){
        statusBox.innerText = "World Loaded";
    }
}

/* =========================
   PLAYER
========================= */

const player = {
    x: 200,
    y: canvas.height - 390,

    width: 230,
    height: 300,

    speed: 5,
    facing: 1,

    moving: false,
    attacking: false,
    spell: false
};

const keys = {};

window.addEventListener("keydown", e=>{
    keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup", e=>{
    keys[e.key.toLowerCase()] = false;
});

/* =========================
   BUTTON ACTIONS
========================= */

function attack(){
    player.attacking = true;

    setTimeout(()=>{
        player.attacking = false;
    },250);
}

function dash(){
    player.x += 120 * player.facing;
}

function spell(){
    player.spell = true;

    setTimeout(()=>{
        player.spell = false;
    },300);
}

/* =========================
   DRAW BACKGROUND
========================= */

function drawBackground(){

    if(bgLoaded){

        ctx.drawImage(
            background,
            0,
            0,
            canvas.width,
            canvas.height
        );
    }

}

/* =========================
   TREES
========================= */

function drawTrees(){

    if(!treeLoaded) return;

    const treeWidth = 220;
    const treeHeight = 350;

    for(let i = 0; i < 12; i++){

        const x = i * 180;

        ctx.drawImage(
            tree,
            x,
            canvas.height - 470,
            treeWidth,
            treeHeight
        );
    }
}

/* =========================
   PLAYER MOVEMENT
========================= */

function updatePlayer(){

    player.moving = false;

    if(keys["a"] || keys["arrowleft"]){
        player.x -= player.speed;
        player.facing = -1;
        player.moving = true;
    }

    if(keys["d"] || keys["arrowright"]){
        player.x += player.speed;
        player.facing = 1;
        player.moving = true;
    }

    if(keys["w"] || keys["arrowup"]){
        player.y -= player.speed;
    }

    if(keys["s"] || keys["arrowdown"]){
        player.y += player.speed;
    }

    player.x = Math.max(
        0,
        Math.min(canvas.width - player.width, player.x)
    );

    player.y = Math.max(
        100,
        Math.min(canvas.height - player.height - 40, player.y)
    );
}

/* =========================
   DRAW HERO
========================= */

function drawHero(){

    if(!heroLoaded) return;

    let bounce = 0;

    if(player.moving){
        bounce = Math.sin(Date.now() * 0.02) * 10;
    }

    ctx.save();

    if(player.facing === -1){

        ctx.translate(
            player.x + player.width,
            player.y + bounce
        );

        ctx.scale(-1,1);

        ctx.drawImage(
            hero,
            0,
            0,
            player.width,
            player.height
        );

    } else {

        ctx.drawImage(
            hero,
            player.x,
            player.y + bounce,
            player.width,
            player.height
        );
    }

    ctx.restore();

    /* ATTACK EFFECT */

    if(player.attacking){

        ctx.strokeStyle = "#7df7ff";
        ctx.lineWidth = 6;

        ctx.beginPath();

        ctx.arc(
            player.x + 140,
            player.y + 140,
            90,
            -0.5,
            0.8
        );

        ctx.stroke();
    }

    /* SPELL EFFECT */

    if(player.spell){

        ctx.fillStyle = "rgba(0,255,255,0.5)";

        ctx.beginPath();

        ctx.arc(
            player.x + 120,
            player.y + 120,
            45,
            0,
            Math.PI * 2
        );

        ctx.fill();
    }
}

/* =========================
   GAME LOOP
========================= */

function gameLoop(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    drawBackground();

    drawTrees();

    updatePlayer();

    drawHero();

    requestAnimationFrame(gameLoop);
}

gameLoop();

</script>
</body>
</html>
