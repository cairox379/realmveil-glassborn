<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Realmveil: Glassborn</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #07131f;
  font-family: Arial, sans-serif;
}

canvas {
  width: 100vw;
  height: 100vh;
  display: block;
}

#creator, #hud, #controls {
  position: fixed;
  z-index: 10;
  color: white;
  background: rgba(0,0,0,.55);
  border: 1px solid rgba(125,247,255,.7);
  border-radius: 14px;
  padding: 10px;
  backdrop-filter: blur(8px);
}

#creator {
  top: 12px;
  left: 12px;
  width: 220px;
}

#hud {
  top: 12px;
  left: 12px;
  display: none;
  font-size: 12px;
}

#controls {
  bottom: 14px;
  left: 12px;
  display: none;
  gap: 8px;
}

button, select {
  background: rgba(0,0,0,.55);
  color: white;
  border: 1px solid rgba(125,247,255,.7);
  border-radius: 10px;
  padding: 8px;
  margin-top: 5px;
}

select {
  width: 100%;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="creator">
  <b>Realmveil: Glassborn</b><br><br>

  Race:
  <select id="race">
    <option>Human</option>
    <option>Elf</option>
    <option>Vampire</option>
    <option>Wraith</option>
  </select>

  Class:
  <select id="classType">
    <option>Knight</option>
    <option>Mage</option>
    <option>Ranger</option>
    <option>Bloodblade</option>
  </select>

  Hair:
  <select id="hair">
    <option>Brown</option>
    <option>Black</option>
    <option>White</option>
    <option>Red</option>
  </select>

  <button onclick="startGame()">Begin Quest</button>
</div>

<div id="hud">
  <b id="name">Hero</b><br>
  HP: <span id="hp">100</span> • XP: <span id="xp">0</span> • Level: <span id="level">1</span>
</div>

<div id="controls">
  <button onclick="moveLeft()">←</button>
  <button onclick="moveRight()">→</button>
  <button onclick="attack()">⚔</button>
  <button onclick="spell()">✦</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = innerWidth * dpr;
  canvas.height = innerHeight * dpr;
  canvas.style.width = innerWidth + "px";
  canvas.style.height = innerHeight + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
addEventListener("resize", resize);

let time = 0;
let gameStarted = false;

let hero = {
  x: 140,
  y: 0,
  vy: 0,
  hp: 100,
  xp: 0,
  level: 1,
  race: "Human",
  classType: "Knight",
  hair: "Brown",
  attacking: false,
  casting: false,
  moving: 0
};

let monsters = [];
let particles = [];

function startGame() {
  hero.race = race.value;
  hero.classType = classType.value;
  hero.hair = hair.value;

  creator.style.display = "none";
  hud.style.display = "block";
  controls.style.display = "flex";
  gameStarted = true;

  name.innerText = `${hero.race} ${hero.classType}`;
  spawnMonster();
}

function spawnMonster() {
  monsters.push({
    x: innerWidth + 90,
    y: innerHeight - 115,
    hp: 70,
    maxHp: 70,
    speed: 0.8,
    type: Math.random() > .5 ? "goblin" : "wraith"
  });
}

setInterval(() => {
  if (gameStarted) spawnMonster();
}, 3500);

function moveLeft() {
  hero.moving = -1;
  setTimeout(() => hero.moving = 0, 350);
}

function moveRight() {
  hero.moving = 1;
  setTimeout(() => hero.moving = 0, 350);
}

function attack() {
  hero.attacking = true;
  setTimeout(() => hero.attacking = false, 250);

  monsters.forEach(m => {
    if (Math.abs(m.x - hero.x) < 110) {
      m.hp -= 35;
      burst(m.x, m.y - 50, "#ffd36b");
    }
  });
}

function spell() {
  hero.casting = true;
  setTimeout(() => hero.casting = false, 450);

  monsters.forEach(m => {
    if (m.x < innerWidth) {
      m.hp -= 22;
      burst(m.x, m.y - 50, "#7df7ff");
    }
  });
}

function burst(x, y, color) {
  for (let i = 0; i < 25; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - .5) * 6,
      vy: (Math.random() - .5) * 6,
      life: 35,
      color
    });
  }
}

/*
NEURAL WRISTBAND / GESTURE INPUT HOOKS:
Connect Meta neural wristband gestures here when available.

Suggested mapping:
- Wrist flick left  -> moveLeft()
- Wrist flick right -> moveRight()
- Pinch             -> attack()
- Hold pinch        -> spell()
- Palm open         -> block/heal
*/

document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") moveLeft();
  if (e.key === "ArrowRight") moveRight();
  if (e.key === " ") attack();
  if (e.key === "f") spell();
});

function drawWorld() {
  const sky = ctx.createLinearGradient(0,0,0,innerHeight);
  sky.addColorStop(0,"#061632");
  sky.addColorStop(.35,"#123b48");
  sky.addColorStop(.7,"#2c6736");
  sky.addColorStop(1,"#5ea843");
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,innerWidth,innerHeight);

  drawLayerTrees(0.15, "#071522", .4, 180);
  drawLayerTrees(0.35, "#14342b", .65, 150);
  drawLayerTrees(0.65, "#235b34", .95, 115);

  drawGround();
  drawFireflies();
}

function drawLayerTrees(speed, color, alpha, height) {
  ctx.save();
  ctx.globalAlpha = alpha;

  for (let i = 0; i < 8; i++) {
    const x = ((i * 210 - time * speed) % (innerWidth + 260)) - 130;
    const base = innerHeight - 80;

    drawDetailedTree(x, base, height, color);
  }

  ctx.restore();
}

function drawDetailedTree(x, y, h, color) {
  ctx.fillStyle = "#3a2414";

  ctx.beginPath();
  ctx.moveTo(x + 35, y);
  ctx.bezierCurveTo(x + 45, y - h*.35, x + 20, y - h*.7, x + 55, y - h);
  ctx.bezierCurveTo(x + 85, y - h*.65, x + 70, y - h*.25, x + 80, y);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = "rgba(255,210,90,.25)";
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x + 55, y - h*.2);
  ctx.bezierCurveTo(x + 70, y - h*.45, x + 45, y - h*.65, x + 65, y - h*.9);
  ctx.stroke();

  for (let i = 0; i < 14; i++) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.ellipse(
      x + 55 + Math.sin(i) * 55,
      y - h + Math.cos(i * 1.7) * 35,
      48,
      30,
      Math.sin(i),
      0,
      Math.PI * 2
    );
    ctx.fill();

    ctx.fillStyle = "rgba(130,255,160,.35)";
    ctx.beginPath();
    ctx.ellipse(
      x + 55 + Math.sin(i + 2) * 45,
      y - h + Math.cos(i) * 25,
      18,
      9,
      Math.sin(i),
      0,
      Math.PI * 2
    );
    ctx.fill();
  }
}

function drawGround() {
  ctx.fillStyle = "#2f7d35";
  ctx.fillRect(0, innerHeight - 82, innerWidth, 90);

  for (let i = 0; i < 180; i++) {
    const x = (i * 19 - time * .8) % innerWidth;
    const y = innerHeight - 70 - Math.sin(i) * 15;

    ctx.fillStyle = i % 4 === 0 ? "#d9ff9a" : "#6cff7d";
    ctx.beginPath();
    ctx.ellipse(x, y, 3, 7, Math.sin(i), 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawFireflies() {
  for (let i = 0; i < 60; i++) {
    const x = (i * 97 + time * .3) % innerWidth;
    const y = 60 + ((i * 53) % (innerHeight - 180));

    ctx.globalAlpha = .4 + Math.sin(time*.04+i)*.3;
    ctx.fillStyle = "#baffd9";
    ctx.shadowBlur = 14;
    ctx.shadowColor = "#7df7ff";
    ctx.beginPath();
    ctx.arc(x, y, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }
}

function drawHero() {
  ctx.save();
  ctx.translate(hero.x, hero.y);

  if (hero.moving) ctx.translate(Math.sin(time*.5)*4, 0);
  if (hero.attacking) ctx.translate(12, 0);

  const skin = hero.race === "Elf" ? "#d6ffc8" :
               hero.race === "Vampire" ? "#e8ddff" :
               hero.race === "Wraith" ? "#c8f7ff" :
               "#ffd6a5";

  const hairColor = hero.hair === "Black" ? "#151515" :
                    hero.hair === "White" ? "#eeeeff" :
                    hero.hair === "Red" ? "#9b2f1f" :
                    "#5b2a1d";

  ctx.shadowBlur = 20;
  ctx.shadowColor = "#7df7ff";

  ctx.fillStyle = hero.classType === "Mage" ? "#6536a8" : "#26305a";
  ctx.beginPath();
  ctx.roundRect(-15, -62, 30, 48, 10);
  ctx.fill();

  ctx.fillStyle = skin;
  ctx.beginPath();
  ctx.arc(0, -80, 15, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = hairColor;
  ctx.beginPath();
  ctx.arc(0, -90, 16, Math.PI, 0);
  ctx.fill();

  ctx.fillStyle = "#111";
  ctx.beginPath();
  ctx.arc(-5, -81, 2, 0, Math.PI * 2);
  ctx.arc(6, -81, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "#552200";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(0, -74, 5, 0, Math.PI);
  ctx.stroke();

  ctx.strokeStyle = "#e8f7ff";
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(14, -48);
  ctx.lineTo(hero.attacking ? 76 : 36, hero.attacking ? -62 : -78);
  ctx.stroke();

  if (hero.casting) {
    ctx.fillStyle = "rgba(125,247,255,.75)";
    ctx.shadowBlur = 28;
    ctx.shadowColor = "#7df7ff";
    ctx.beginPath();
    ctx.arc(52, -72, 24, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawMonster(m) {
  ctx.save();
  ctx.translate(m.x, m.y);

  ctx.shadowBlur = 18;
  ctx.shadowColor = "#ff5c7a";

  ctx.fillStyle = m.type === "wraith" ? "#403068" : "#3d6b38";
  ctx.beginPath();
  ctx.ellipse(0, -35, 30, 34, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#ffdd66";
  ctx.beginPath();
  ctx.arc(-9, -42, 4, 0, Math.PI * 2);
  ctx.arc(9, -42, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function update() {
  time++;
  hero.y = innerHeight - 92;
  hero.x += hero.moving * 4;
  hero.x = Math.max(60, Math.min(innerWidth - 80, hero.x));

  monsters.forEach(m => {
    m.x -= m.speed;
    if (Math.abs(m.x - hero.x) < 35) hero.hp -= .08;
  });

  monsters = monsters.filter(m => {
    if (m.hp <= 0) {
      hero.xp += 10;
      return false;
    }
    return m.x > -80;
  });

  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
  });

  particles = particles.filter(p => p.life > 0);

  hp.innerText = Math.floor(hero.hp);
  xp.innerText = hero.xp;
  level.innerText = hero.level;
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 35;
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 16;
    ctx.shadowColor = p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,4,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  });
}

function loop() {
  update();
  drawWorld();
  if (gameStarted) {
    drawHero();
    monsters.forEach(drawMonster);
    drawParticles();
  }
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
